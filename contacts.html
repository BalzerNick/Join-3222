<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join_Contacts</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contacts.css">
</head>
<body onload="renderContacts()">
    <!-- Platzhalter: linke Navbar - wird von einer anderen Person gebaut -->
    <aside class="navbar" id="navbar">Navbar (Platzhalter)</aside>

    <!-- Platzhalter: obere Headerleiste - wird von einer anderen Person gebaut -->
    <header class="header" id="header">Header (Platzhalter)</header>

    <main class="content contacts-main">
        <div class="contacts-head">
            <h1>Contacts</h1>
            <button class="btn btn-primary" type="button" onclick="openAddContact()">Add new contact</button>
        </div>

        <div id="contactList"></div>
    </main>

    <!-- Overlay fuer das Add-Contact-Popup, per JS befuellt -->
    <div id="addContactOverlay" class="overlay d-none"></div>

    <!-- Toast: seitenuebergreifend, Text setzt showToast() -->
    <div id="toast" class="toast"></div>

    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
    <script src="scripts/contacts.js"></script>
</body>
</html>
