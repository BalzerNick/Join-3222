<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary Guest</title>
    <link rel="stylesheet" href="css/style.css">
     <link rel="stylesheet" href="css/card-css.css">
</head>
<body>
    <header>
        Kanban Project Management Tool
    </header>        
        <div class="menu-line">
        <img src="assets/imgs/logoMainWhite.png" alt="Join Logo" class="menu-logo">
        <!-- <a href="index.html" class="back-arrow"><img src="assets/imgs/summary.png" alt="Summary"></a> -->
    </div>
    <!-- <a href="index.html" class="back-arrow">&larr;</a> -->

    <main class="page">
        <div class="help-heading-blue-line"><h1>Join 360</h1><img src="assets/imgs/blue-line.png" alt="Line Icon" class="blue-line">
        <span>Key Metrics at a Glance</span></div>
        <!-- <br><br> -->
        <div class="summary-1Line">
            <div class="stat-card">        
                <p class="stat-number"><img src="assets/imgs/pencil-icon-circle-black.png" alt="To-do Icon" class="pencil-icon">2</p>
                <p class="stat-label">To-do</p>
            </div>

            <div class="stat-card">        
                <p class="stat-number"><img src="assets/imgs/hook-icon.png" alt="To-do Icon" class="pencil-icon">1</p>
                <p class="stat-label">Done</p>
            </div>
        </div>

        <div class="stat-card-wide">        
                <p class="stat-number"><img src="assets/imgs/red-arrow-circle.png" alt="To-do Icon" class="pencil-icon">2
                <img src="assets/imgs/white-line.png" alt="Line" class="white-line"><span class="date-txt">July 24, 2026</span></p>
                
                <p class="stat-label">Urgent</p>
        </div>
       
    </main>

    <footer class="footer">
        <a href="privacyPolicy.html" class="footer-link">Privacy Policy</a>
        <a href="legalNotice.html" class="footer-link">Legal notice</a>
    </footer>
</body>
</html>
