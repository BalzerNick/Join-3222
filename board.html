<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join_Board</title>
    <link rel="stylesheet" href="css/board.css">
    <script src="scripts/board.js"></script>
</head>
<body>
    <body onload="initPage()">
    <div class="app-shell">
        <div id="sideboard-container"></div>
        <main class="board-mask">

            <div class="page-header">
                <div>
                    <h1>Board</h1>
                </div>
                <div class="page-actions">
                    <label class="search-input">
                        <input type="text" placeholder="Find Task" />
                        <span><img src="./assets/icons/searchlens.png" alt="search"></span>
                    </label>
                    <button class="add-task-button" onclick="openAddTaskDialog()">Add Task +</button>
                </div>
            </div>

            <section class="drag-container">

                <section class="column">
                <div class="column-header">  
                <h2>To Do</h2>
                <button onclick="openAddTaskDialog()"><img src="./assets/icons/plus_add_task.png" alt="add task"></button>
                </div>
                <div class="drag-area" id="todo" ondrop="moveTo('todo')" ondragleave="removeHighlight('todo')"
                    ondragover="allowDrop(event); highlight('todo')"></div>
            </section>

            <section class="column">
                <div class="column-header">  
                <h2>In Progress</h2>
                <button onclick="openAddTaskDialog()"><img src="./assets/icons/plus_add_task.png" alt="add task"></button>
                </div>
                <div class="drag-area" id="in-progress" ondrop="moveTo('in-progress')" ondragleave="removeHighlight('in-progress')"
                    ondragover="allowDrop(event); highlight('in-progress')"></div>
            </section>

            <section class="column">
                <div class="column-header">  
                <h2>Await feedback</h2>
                <button onclick="openAddTaskDialog()"><img src="./assets/icons/plus_add_task.png" alt="add task"></button>
                </div>
                <div class="drag-area" id="await-feedback" ondrop="moveTo('await-feedback')" ondragleave="removeHighlight('await-feedback')"
                    ondragover="allowDrop(event); highlight('await-feedback')"></div>
            </section>

            <section class="column">
                <div class="column-header">  
                <h2>Done</h2>
                <button onclick="openAddTaskDialog()"><img src="./assets/icons/plus_add_task.png" alt="add task"></button>
                </div>
                <div class="drag-area" id="done" ondrop="moveTo('done')" ondragleave="removeHighlight('done')"
                    ondragover="allowDrop(event); highlight('done')"></div>
            </section>


        </section>

        </main>
        
        <div id="add-task-modal" class="modal-overlay hidden" onclick="closeAddTaskDialog(event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h2>Add Task</h2>
                    <button class="modal-close" onclick="closeAddTaskDialog()">&times;</button>
                </div>
                <div id="modal-body" class="modal-body"></div>
            </div>
        </div>
    </div>
</body>
</body>
</html>
